spring.application.name=taskmaneger

spring.datasource.url=jdbc:postgresql://localhost:5432/elotech?currentSchema=taskmanager
spring.datasource.username=elotech
spring.datasource.password=elotech
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=taskmanager

spring.flyway.enabled=true
spring.flyway.default-schema=taskmanager
spring.flyway.create-schemas=true

spring.mvc.problemdetails.enabled=true

jwt.public.key=classpath:public.pem
jwt.private.key=classpath:private.pem

spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m