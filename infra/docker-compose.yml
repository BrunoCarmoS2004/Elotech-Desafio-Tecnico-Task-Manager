services:
  database:
    image: postgres:15-alpine
    container_name: postgres-taskmanager
    restart: always
    environment:
      POSTGRES_USER: elotech
      POSTGRES_PASSWORD: elotech
      POSTGRES_DB: elotech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "elotech", "-d", "elotech"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ../taskmanager
    container_name: java_backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/elotech?currentSchema=taskmanager
      - SPRING_DATASOURCE_USERNAME=elotech
      - SPRING_DATASOURCE_PASSWORD=elotech
    networks:
      - app-network

  frontend:
    build: ../taskmanager-frontend
    container_name: angular_frontend
    restart: always
    ports:
      - "4200:4200"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge